name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats badges
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ndabdulsalaam
        run: |
          USER_DATA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/users/$USERNAME)
          REPOS=$(echo "$USER_DATA" | jq '.public_repos')
          FOLLOWERS=$(echo "$USER_DATA" | jq '.followers')

          REPOS_DATA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/users/$USERNAME/repos?per_page=100&type=owner")

          STARS=$(echo "$REPOS_DATA" | jq '[.[].stargazers_count] | add // 0')
          FORKS=$(echo "$REPOS_DATA" | jq '[.[].forks_count] | add // 0')

          STARS_GIVEN=$(curl -s -I -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/users/$USERNAME/starred?per_page=1" | grep -i link | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p')
          STARS_GIVEN=${STARS_GIVEN:-0}

          mkdir -p badges

          curl -s "https://img.shields.io/badge/Public%20Repos-$REPOS-blue?style=flat-square&logo=github&logoColor=white" > badges/repos.svg
          curl -s "https://img.shields.io/badge/Stars%20Received-$STARS-orange?style=flat-square&logo=github&logoColor=white" > badges/stars-received.svg
          curl -s "https://img.shields.io/badge/Forks-$FORKS-blue?style=flat-square&logo=github&logoColor=white" > badges/forks.svg
          curl -s "https://img.shields.io/badge/Followers-$FOLLOWERS-orange?style=flat-square&logo=github&logoColor=white" > badges/followers.svg
          curl -s "https://img.shields.io/badge/Stars%20Given-$STARS_GIVEN-yellow?style=flat-square&logo=github&logoColor=white" > badges/stars-given.svg

      - name: Commit updated badges
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add badges/
          git commit -m "Update GitHub stats badges" || echo "No changes to commit"
          git push
